edition: 1.0.0
name: innoseed-decode-tag
access: aliyun-mcig

services:
  decode-tag:
    component: fc
    props:
      region: cn-hangzhou
      service:
        name: innoseed-decode-tag
        internetAccess: true
        description: Feishu Bitable tag decode webhook (FC custom runtime + Express)
      function:
        name: decode-tag
        runtime: custom
        handler: index.handler
        memorySize: 256
        timeout: 15
        codeUri: ./code
        instanceConcurrency: 10
        environmentVariables:
          FEISHU_APP_ID: ${env.FEISHU_APP_ID}
          FEISHU_APP_SECRET: ${env.FEISHU_APP_SECRET}
          FEISHU_BITABLE_TOKEN: ${env.FEISHU_BITABLE_TOKEN}
          FEISHU_TABLE_ID: ${env.FEISHU_TABLE_ID}
          DECODE_TAG_TOKEN: ${env.DECODE_TAG_TOKEN}
          INTERVIEWER_MAP: ${env.INTERVIEWER_MAP}
          LOOKUP_BY_NAME: "true"
          BITABLE_FIELD_CODE: "个性标签"
          BITABLE_FIELD_LANE: "Mini Camp选路"
          BITABLE_FIELD_TECH: "技术特长"
          BITABLE_FIELD_PLAY: "兴趣爱好"
          BITABLE_FIELD_FUTURE: "未来道路"
          BITABLE_FIELD_TA: "interviewer"
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
