<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>页面走丢了 · InnOSeed Lab</title>
    <meta name="theme-color" content="#1C64F2" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/png" href="/imgs/favicon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
        min-height: 100vh;
        background: #F7F5EF;
        color: #1F2937;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      main {
        max-width: 560px;
        width: 100%;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: 'Fraunces', 'Noto Serif SC', serif;
        font-weight: 700;
        font-size: 19px;
        margin-bottom: 48px;
      }
      .brand img { width: 32px; height: 32px; border-radius: 50%; background: #fff; }
      .code {
        font-family: 'Fraunces', 'Noto Serif SC', serif;
        font-style: italic;
        font-weight: 800;
        font-size: clamp(120px, 22vw, 220px);
        line-height: 0.9;
        color: #1F2937;
        letter-spacing: -0.04em;
        margin-bottom: 24px;
      }
      h1 {
        font-family: 'Noto Serif SC', serif;
        font-weight: 900;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.2;
        margin-bottom: 16px;
        letter-spacing: -0.01em;
      }
      h1 em {
        font-family: 'Fraunces', serif;
        font-style: italic;
        color: #1C64F2;
      }
      p {
        font-size: 17px;
        line-height: 1.65;
        color: #4B5563;
        margin-bottom: 40px;
        max-width: 440px;
        margin-left: auto;
        margin-right: auto;
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 18px 32px;
        background: #1C64F2;
        color: #fff;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        position: relative;
        overflow: hidden;
        isolation: isolate;
      }
      .cta::before {
        content: '';
        position: absolute;
        inset: 0;
        background: #1F2937;
        transform: translateX(-101%);
        transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        z-index: -1;
      }
      .cta:hover::before { transform: translateX(0); }
      .cta:focus-visible {
        outline: 3px solid #D4A24C;
        outline-offset: 3px;
      }
      .arrow { font-family: 'Fraunces', serif; font-style: italic; }
      footer {
        margin-top: 80px;
        font-size: 13px;
        color: #6B7280;
      }
      footer a { color: #1C64F2; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <a href="/" class="brand" style="text-decoration: none; color: inherit;">
        <img src="/imgs/favicon.png" alt="" />
        <span>InnOSeed · CSU</span>
      </a>
      <div class="code">404</div>
      <h1>页面走丢了，<br/>但种子还在 <em>土里。</em></h1>
      <p>你找的页面可能搬家了、被收走了、或者根本没存在过。<br/>回主页看看 InnOSeed 在做什么 — 比迷路的地方有意思得多。</p>
      <a href="/" class="cta">
        <span>回到首页</span>
        <span class="arrow">→</span>
      </a>
      <footer>
        © 2025 InnOSeed Lab · <a href="mailto:contact@innoseed.club">contact@innoseed.club</a>
      </footer>
    </main>
  </body>
</html>
