name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same branch — saves CI minutes when pushing
# follow-up commits to a PR before the prior run finishes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Vercel production runs on Node 22; mirror that to avoid platform drift.
  NODE_VERSION: '22'

jobs:
  build-and-test:
    name: Build + Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # esbuild postinstall runs here (approved via pnpm-workspace.yaml).

      - name: Typecheck (src)
        run: pnpm typecheck
        # Strict TS pass — surfaces type regressions in the React
        # source tree before the build / e2e steps spend time on
        # a broken source tree.

      - name: Typecheck (vite.config.ts)
        run: pnpm exec tsc -p tsconfig.node.json
        # vite.config.ts uses Node types, so it lives in a separate
        # project (tsconfig.node.json) and gets its own pass.

      - name: Build
        run: pnpm build
        # `tsc --noEmit && vite build` — build runs typecheck again
        # as a safety net if the typecheck step was skipped.

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
